<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박진우보청기 청각전문그룹 스마트 상담 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #003366; --dark: #0f172a; --blue: #38bdf8; --accent: #f43f5e; }
        
        /* 스크롤바 형식으로 복구 (overflow:hidden 및 100vh 제거, 여백 추가) */
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; color: #334155; margin: 0; padding: 20px; }
        
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); font-size: 2.2rem; margin-bottom: 30px; border-bottom: 4px solid var(--primary); padding-bottom: 15px; }
        .section { margin-bottom: 60px; }
        h2 { font-size: 1.5rem; color: var(--primary); border-left: 6px solid var(--primary); padding-left: 15px; margin-bottom: 25px; }

        /* 귀 구조 */
        .ear-simulation-container { background: #f1f5f9; padding: 30px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .image-mapper { position: relative; width: 100%; max-width: 900px; margin: 0 auto; padding-bottom: 60%; background-image: url('ear_structure.jpg'); background-size: cover; background-position: center; border-radius: 15px; border: 2px solid #cbd5e1; }
        .hotspot { position: absolute; cursor: pointer; border-radius: 50%; background: rgba(255,255,255,0.01); transition: 0.3s; }
        .hotspot:hover, .hotspot.active { background: rgba(244,63,94,0.2); border: 2px solid var(--accent); }
        #spot-outer { top: 20%; left: 2%; width: 30%; height: 55%; }
        #spot-middle { top: 35%; left: 40%; width: 18%; height: 30%; }
        #spot-inner { top: 28%; left: 60%; width: 20%; height: 38%; }
        #spot-nerve { top: 22%; left: 81%; width: 17%; height: 32%; }
        .desc-panel { background: white; margin-top: 20px; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; min-height: 80px; text-align: center; }

        /* 청력도 및 평균값 표시 */
        .chart-container { height: 600px; margin: 20px 0; background: #fff; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; position: relative; overflow-x: auto; }
        .chart-inner { min-width: 850px; height: 100%; position: relative; }

        .avg-display-container { display: flex; justify-content: space-around; background: #f8fafc; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .avg-box { text-align: center; flex: 1; }
        .avg-label { font-weight: bold; font-size: 1rem; color: #64748b; margin-bottom: 5px; }
        .avg-value { font-size: 2rem; font-weight: 800; }
        .avg-value.right { color: #d93025; }
        .avg-value.left { color: #1a73e8; }
        .unit { font-size: 1.1rem; margin-left: 5px; color: #94a3b8; }

        .btn-group { text-align: center; margin-bottom: 20px; }
        .btn { padding: 12px 35px; border: 2px solid #ddd; background: #fff; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .btn.active-r { border-color: #d93025; color: #d93025; background: #fff5f5; }
        .btn.active-l { border-color: #1a73e8; color: #1a73e8; background: #f0f7ff; }

        /* 시뮬레이터 */
        .sim-container { background: var(--dark); color: white; padding: 40px; border-radius: 24px; text-align: center; }
        .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .preset-btn { padding: 15px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .preset-btn.active { background: var(--primary); color: white; border-color: var(--blue); }
        .display-area { background: rgba(0,0,0,0.4); padding: 40px; border-radius: 20px; min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        #simText { font-size: 2.2rem; font-weight: 800; line-height: 1.3; transition: 0.3s; }
        #envStatus { font-size: 1.2rem; font-weight: 600; color: var(--blue); margin-top: 15px; }
        input[type=range] { width: 100%; accent-color: var(--blue); cursor: pointer; margin-top: 10px; }

        .media-box { width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; background: #000; cursor: zoom-in; text-align: center; }
        .media-box img, .media-box video { width: 100%; display: block; margin: 0 auto; }
        #imageModal { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>박진우보청기 청각전문그룹 스마트 상담 시스템</h1>

    <div class="section">
        <h2>1. 귀의 구조와 소리 전달 경로</h2>
        <div class="ear-simulation-container">
            <div class="image-mapper">
                <div class="hotspot" id="spot-outer" onclick="showPath('outer')"></div>
                <div class="hotspot" id="spot-middle" onclick="showPath('middle')"></div>
                <div class="hotspot" id="spot-inner" onclick="showPath('inner')"></div>
                <div class="hotspot" id="spot-nerve" onclick="showPath('nerve')"></div>
            </div>
            <div class="desc-panel" id="desc-panel">
                <h3>소리 전달의 이해</h3>
                <p>각 부위를 클릭하여 소리가 전달되는 원리를 확인해보세요.</p>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>2. 소리 전달 시뮬레이션 영상</h2>
        <div class="media-box"><video controls><source src="video.mp4" type="video/mp4"></video></div>
    </div>

    <div class="section">
        <h2>3. 난청의 유형 (클릭하여 이미지 넘기기)</h2>
        <div class="media-box" style="background:#fff; border:none; cursor:pointer;" onclick="nextHlType()">
            <img id="hlTypeImg" src="1.jpg" style="max-width:100%; border-radius:15px; border: 1px solid #e2e8f0;" alt="난청의 유형">
        </div>
    </div>

    <div class="section">
        <h2>4. 청력 분석 및 발음 왜곡 시뮬레이션</h2>
        <div class="btn-group">
            <button id="btnR" class="btn active-r" onclick="setChartMode('R')">우측(○) 입력</button>
            <button id="btnL" class="btn" onclick="setChartMode('L')">좌측(✕) 입력</button>
        </div>
        
        <div class="chart-container">
            <div class="chart-inner">
                <canvas id="audiogramChart"></canvas>
            </div>
        </div>

        <div class="avg-display-container">
            <div class="avg-box">
                <div class="avg-label">우측(R) 평균 (6분법)</div>
                <div id="avgR" class="avg-value right">20.0<span class="unit">dB</span></div>
            </div>
            <div class="avg-box" style="border-left: 1px solid #e2e8f0;">
                <div class="avg-label">좌측(L) 평균 (6분법)</div>
                <div id="avgL" class="avg-value left">30.0<span class="unit">dB</span></div>
            </div>
        </div>

        <div class="sim-container">
            <div class="preset-grid">
                <button id="env-quiet" class="preset-btn active" onclick="setEnv('quiet')">🏠 조용한 방</button>
                <button id="env-cafe" class="preset-btn" onclick="setEnv('cafe')">☕ 카페 소음</button>
                <button id="env-street" class="preset-btn" onclick="setEnv('street')">🚗 도로 소음</button>
                <button id="env-meeting" class="preset-btn" onclick="setEnv('meeting')">👥 다자 회의</button>
            </div>
            <div class="display-area">
                <div id="simText">"아버지가 방에 들어가신다"</div>
                <div id="envStatus">환경: 매우 선명하게 들리는 상태입니다.</div>
            </div>
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <span style="color:#94a3b8; font-weight:bold;">어음 인지력 (WRS) 점수 설정</span>
                <span style="color:var(--blue); font-weight:bold; font-size:1.5rem;"><span id="wrsVal">100</span>%</span>
            </div>
            <input type="range" id="wrsRange" min="0" max="100" value="100" oninput="updateSim()">
            
            <div style="margin-top: 30px;">
                <img src="스크린샷_9-5-2026_9335_.jpeg" style="width: 100%; max-width: 800px; border-radius: 10px;" alt="어음 명료도 이미지">
            </div>
        </div>
    </div>

    <div class="section">
        <h2>5. 보청기 형태 안내</h2>
        <div class="media-box" onclick="openModal('hearing_aid_styles.jpg')">
            <img src="hearing_aid_styles.jpg">
        </div>
    </div>

</div>

<div id="imageModal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>

<script>
    // 난청 유형 이미지 클릭 이벤트 유지
    const hlImages = ['1.jpg', '3.jpg', '4.jpg', '5.jpg'];
    let hlIndex = 0;
    function nextHlType() {
        hlIndex++;
        if(hlIndex >= hlImages.length) hlIndex = 0;
        document.getElementById('hlTypeImg').src = hlImages[hlIndex];
    }

    // 1. 귀 구조 인터랙티브
    const pathData = {
        outer: { title: "외이 (Outer Ear)", desc: "소리를 모아 외이도를 통해 전달합니다." },
        middle: { title: "중이 (Middle Ear)", desc: "고막과 이소골이 진동을 증폭합니다." },
        inner: { title: "내이 (Inner Ear)", desc: "달팽이관이 진동을 전기신호로 바꿉니다." },
        nerve: { title: "청신경 (Auditory Nerve)", desc: "뇌로 신호를 보내 소리를 인지하게 합니다." }
    };
    function showPath(part) {
        document.querySelectorAll('.hotspot').forEach(el => el.classList.remove('active'));
        document.getElementById(`spot-${part}`).classList.add('active');
        const data = pathData[part];
        document.getElementById('desc-panel').innerHTML = `<h3>${data.title}</h3><p>${data.desc}</p>`;
    }
    function openModal(src) { document.getElementById('modalImg').src = src; document.getElementById('imageModal').style.display = 'flex'; }

    // 2. 청력도 구현 및 6분법 계산 로직
    let chartMode = 'R';
    const ctx = document.getElementById('audiogramChart').getContext('2d');

    const audiogramBackground = {
        id: 'audiogramBackground',
        beforeDraw: (chart) => {
            const {ctx, chartArea: {top, bottom, left, right}, scales: {y}} = chart;
            const zones = [
                {m: -10, x: 20, c: "#f4f9ff", t1: "정상 청력", t2: "(-10~20dB)", d: ["듣는데 어려움 없음"]},
                {m: 20, x: 40, c: "#dcedfc", t1: "경도 난청", t2: "(20~40dB)", d: ["작은 소리 듣기 어려움", "소음이 있을 때 듣기 까다로움"]},
                {m: 40, x: 70, c: "#b0d4f5", t1: "중도 난청", t2: "(40~70dB)", d: ["일상적인 대화 어려움", "TV 시청 시 소리를 크게 키움", "다수와 대화 시, 이해가 어려움"]},
                {m: 70, x: 90, c: "#87bded", t1: "고도 난청", t2: "(70~90dB)", d: ["큰 소리로 대화해도 듣기 어려움", "보청기 등 청각 보조 장치 필수"]},
                {m: 90, x: 120, c: "#60a8e6", t1: "심도 난청", t2: "(90dB~)", d: ["큰 소리도 겨우 들을 수 있음", "보청기 효과가 제한적일 수 있음"]}
            ];
            ctx.save();
            zones.forEach(z => {
                let sy = y.getPixelForValue(z.m);
                let ey = y.getPixelForValue(z.x);
                ctx.fillStyle = z.c;
                ctx.fillRect(left, sy, right - left + 360, ey - sy);

                ctx.beginPath(); ctx.moveTo(left, ey); ctx.lineTo(right + 360, ey);
                ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 1; ctx.stroke();

                ctx.fillStyle = "#334155"; ctx.textBaseline = "middle";
                const cy = (sy + ey) / 2; const tx = right + 20; const dx = right + 120; 

                ctx.font = "bold 15px Pretendard"; ctx.fillText(z.t1, tx, cy - 10);
                ctx.font = "14px Pretendard"; ctx.fillText(z.t2, tx, cy + 10);

                ctx.font = "14px Pretendard"; const lh = 22; 
                const startY = cy - ((z.d.length - 1) * lh) / 2;
                z.d.forEach((line, i) => { ctx.fillText(line, dx, startY + (i * lh)); });
            });

            ctx.fillStyle = "#64748b"; ctx.font = "bold 13px Pretendard"; ctx.textAlign = "center";
            ctx.fillText("낮은소리 ◀──────── 소리의 높낮이(Hz) ────────▶ 높은소리", left + (right - left) / 2, top - 35);
            ctx.save(); ctx.translate(left - 45, top + (bottom - top) / 2); ctx.rotate(-Math.PI / 2);
            ctx.fillText("작은소리 ◀──────── 소리의 세기(dB) ────────▶ 큰소리", 0, 0); ctx.restore();
            ctx.restore();
        }
    };

    const chart = new Chart(ctx, {
        type: 'line',
        plugins: [audiogramBackground],
        data: {
            labels: ['250', '500', '1k', '2k', '4k', '8k'],
            datasets: [
                { label: '우측(R)', data: [20,20,20,20,20,20], borderColor: '#d93025', backgroundColor: '#d93025', pointRadius: 10, fill: false, z: 10 },
                { label: '좌측(L)', data: [30,30,30,30,30,30], borderColor: '#1a73e8', backgroundColor: '#1a73e8', pointStyle: 'crossRot', pointRadius: 12, fill: false, z: 10 },
                {
                    label: 'Speech Banana',
                    data: [{x:'250', y:[35,50]},{x:'500', y:[25,55]},{x:'1k', y:[20,60]},{x:'2k', y:[15,60]},{x:'4k', y:[15,55]},{x:'8k', y:[15,50]}],
                    backgroundColor: 'rgba(255, 235, 59, 0.4)', borderColor: 'transparent', fill: true, pointRadius: 0, tension: 0.4
                }
            ]
        },
        options: {
            maintainAspectRatio: false,
            layout: { padding: { left: 60, right: 380, top: 60, bottom: 20 } },
            scales: {
                y: { reverse: true, min: -10, max: 120, ticks: { stepSize: 10, font: {weight: 'bold'} }, grid: { color: 'rgba(0,0,0,0.05)' } },
                x: { position: 'top', ticks: { font: {weight: 'bold'} }, grid: { color: 'rgba(0,0,0,0.05)' } }
            },
            plugins: { legend: { labels: { filter: (item) => item.text !== 'Speech Banana' } } },
            onClick: (e) => {
                const pos = Chart.helpers.getRelativePosition(e, chart);
                const x = chart.scales.x.getValueForPixel(pos.x);
                const y = Math.round(chart.scales.y.getValueForPixel(pos.y)/5)*5;
                if(x >=0 && x <=5) { 
                    chart.data.datasets[chartMode==='R'?0:1].data[x] = y; 
                    chart.update(); 
                    calculateAverage(); 
                }
            }
        }
    });

    // 6분법 평균 계산 함수: (500 + 1k*2 + 2k*2 + 4k) / 6
    function calculateAverage() {
        const dataR = chart.data.datasets[0].data; // 우측 데이터
        const dataL = chart.data.datasets[1].data; // 좌측 데이터

        // 인덱스: 500Hz=1, 1k=2, 2k=3, 4k=4
        const avgR = (dataR[1] + (dataR[2] * 2) + (dataR[3] * 2) + dataR[4]) / 6;
        const avgL = (dataL[1] + (dataL[2] * 2) + (dataL[3] * 2) + dataL[4]) / 6;

        document.getElementById('avgR').innerHTML = `${avgR.toFixed(1)}<span class="unit">dB</span>`;
        document.getElementById('avgL').innerHTML = `${avgL.toFixed(1)}<span class="unit">dB</span>`;
    }

    function setChartMode(m) { 
        chartMode = m; 
        document.getElementById('btnR').className = m==='R'?'btn active-r':'btn'; 
        document.getElementById('btnL').className = m==='L'?'btn active-l':'btn'; 
    }

    // 3. 발음 왜곡 시뮬레이터 로직
    let currentEnv = 'quiet';
    const envConfig = {
        quiet: { noise: 0, name: "조용한 실내", desc: "주변이 조용하여 작은 소리도 비교적 잘 들립니다." },
        cafe: { noise: 30, name: "소란스러운 카페", desc: "주변 웅성거리는 소음으로 인해 말소리가 묻힙니다." },
        street: { noise: 60, name: "시끄러운 도로변", desc: "차 소리와 소음 때문에 대화가 매우 어렵습니다." },
        meeting: { noise: 40, name: "여러 명과의 회의", desc: "다수가 동시에 말할 때 특정 목소리를 구분하기 힘듭니다." }
    };

    function setEnv(type) {
        currentEnv = type;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`env-${type}`).classList.add('active');
        updateSim();
    }

    function updateSim() {
        const wrs = parseInt(document.getElementById('wrsRange').value);
        document.getElementById('wrsVal').innerText = wrs;
        const env = envConfig[currentEnv];
        const text = document.getElementById('simText');
        const status = document.getElementById('envStatus');
        const effectiveScore = wrs - (env.noise * 0.5); 
        
        if (effectiveScore > 85) {
            status.innerText = `환경: ${env.name} - 매우 선명한 상태입니다.`;
            text.innerText = "\"아버지가 방에 들어가신다\"";
            text.style.color = "#ffffff";
        } else if (effectiveScore > 65) {
            status.innerText = `환경: ${env.name} - 약간의 집중이 필요합니다.`;
            text.innerText = "\"아버지가 밤에 드러가신다\"";
            text.style.color = "#e2e8f0";
        } else if (effectiveScore > 40) {
            status.innerText = `환경: ${env.name} - 단어 구분이 어렵고 대화가 끊깁니다.`;
            text.innerText = "\"아머미가 밤에 드러마신다\"";
            text.style.color = "#cbd5e1";
        } else {
            status.innerText = `환경: ${env.name} - 소리는 들리나 인지가 불가능합니다.`;
            text.innerText = "\"ㅇㅂㅈㄱ ㅂㅇ ㄷㅇㄱㅅㄷ\"";
            text.style.color = "#94a3b8";
        }

        const distortion = (100 - effectiveScore);
        text.style.filter = `blur(${distortion/25}px)`;
        text.style.transform = `skewX(${distortion/15}deg)`;
    }

    // 초기 실행
    calculateAverage();
    updateSim();
</script>
</body>
</html>
