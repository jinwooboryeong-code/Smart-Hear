<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박진우보청기 청각전문그룹 스마트 상담 시스템 V2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #003366; --dark: #0f172a; --blue: #38bdf8; --accent: #f43f5e; --success: #2ecc71; --warning: #e74c3c; }
        
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; color: #334155; margin: 0; padding: 20px; }
        
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); font-size: 2.2rem; margin-bottom: 30px; border-bottom: 4px solid var(--primary); padding-bottom: 15px; }
        .section { margin-bottom: 60px; }
        h2 { font-size: 1.5rem; color: var(--primary); border-left: 6px solid var(--primary); padding-left: 15px; margin-bottom: 25px; }

        /* 1. 귀 구조 인터랙티브 */
        .ear-simulation-container { background: #f1f5f9; padding: 30px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .image-mapper { position: relative; width: 100%; max-width: 900px; margin: 0 auto; padding-bottom: 60%; background-image: url('ear_structure.jpg'); background-size: cover; background-position: center; border-radius: 15px; border: 2px solid #cbd5e1; overflow: hidden; }
        .hotspot { position: absolute; cursor: pointer; border-radius: 50%; background: rgba(255,255,255,0.01); transition: 0.3s; z-index: 10; }
        .hotspot:hover, .hotspot.active { background: rgba(244,63,94,0.2); border: 2px solid var(--accent); }
        #spot-outer { top: 20%; left: 2%; width: 30%; height: 55%; }
        #spot-middle { top: 35%; left: 40%; width: 18%; height: 30%; }
        #spot-inner { top: 28%; left: 60%; width: 20%; height: 38%; }
        #spot-nerve { top: 22%; left: 81%; width: 17%; height: 32%; }
        .desc-panel { background: white; margin-top: 20px; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; min-height: 80px; text-align: center; }

        .sound-particle { position: absolute; width: 22px; height: 22px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 20; left: -5%; top: 40%; opacity: 0; transition: left 0.7s ease-in-out, top 0.7s ease-in-out, opacity 0.3s; }
        .sound-particle.active-particle { opacity: 1; animation: pulseGlow 1.2s infinite ease-in-out; }
        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px 8px rgba(244, 63, 94, 0.6); }
            50% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 30px 15px rgba(244, 63, 94, 0.9); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px 8px rgba(244, 63, 94, 0.6); }
        }

        /* 3. 난청 유형 */
        .hl-mapper { position: relative; width: 100%; max-width: 100%; margin: 0 auto; border-radius: 15px; border: 1px solid #e2e8f0; overflow: hidden; background: #fff; }
        .hl-hotspot { position: absolute; cursor: pointer; z-index: 10; }

        /* 4. 청력 분석 */
        .chart-container { height: 500px; margin: 20px 0; background: #fff; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; position: relative; overflow-x: auto; }
        .chart-inner { min-width: 850px; height: 100%; position: relative; }
        .avg-display-container { display: flex; justify-content: space-around; background: #f8fafc; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .avg-box { text-align: center; flex: 1; }
        .avg-label { font-weight: bold; font-size: 1rem; color: #64748b; margin-bottom: 5px; }
        .avg-value { font-size: 2rem; font-weight: 800; }
        .avg-value.right { color: #d93025; }
        .avg-value.left { color: #1a73e8; }
        .unit { font-size: 1.1rem; margin-left: 5px; color: #94a3b8; }
        .btn-group { text-align: center; margin-bottom: 20px; }
        .btn { padding: 12px 35px; border: 2px solid #ddd; background: #fff; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .btn.active-r { border-color: #d93025; color: #d93025; background: #fff5f5; }
        .btn.active-l { border-color: #1a73e8; color: #1a73e8; background: #f0f7ff; }

        /* 시뮬레이터 */
        .sim-section { background: #eaeff2; padding: 30px; border-radius: 30px; margin-top: 20px; }
        .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .preset-btn { padding: 12px 5px; border: 2px solid #eee; border-radius: 12px; background: white; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 0.85rem; }
        .preset-btn:hover { border-color: var(--primary); background: #f0f8ff; }

        .display-box { 
            background: #000; color: #fff; padding: 60px 25px 80px 25px; border-radius: 20px; 
            min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            margin-bottom: 25px; text-align: center; position: relative; overflow: hidden; 
            border: 5px solid #333;
        }
        #waveform { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #text-target { position: relative; z-index: 3; font-weight: 700; line-height: 1.4; transition: 0.3s; white-space: pre-wrap; word-break: keep-all; text-shadow: 0 0 10px rgba(0,0,0,0.8); }

        .wearing-mode { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #eee; background: #fff; cursor: pointer; font-weight: 800; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .mode-btn.active { border-color: var(--success); background: #f0fff4; color: #27ae60; }
        .mode-btn.single.active { border-color: var(--warning); background: #fff5f5; color: #c0392b; }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .control-group { background: #fff; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
        .control-group label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 0.85rem; text-align: center; color: #555; }
        .control-group label span { color: var(--primary); display: block; font-size: 1.1rem; margin-top: 5px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        .switch-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .switch-card { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 25px; border-radius: 15px; border: 1px solid #eee; font-weight: 700; font-size: 0.95rem; gap: 20px; min-width: 250px; }
        .toggle { position: relative; width: 44px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        .info-panel { background: var(--dark); color: white; padding: 20px; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; text-align: center; }
        .highlight { color: #55efc4; font-weight: 800; }

        .media-box { width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; background: #fff; cursor: zoom-in; text-align: center; }
        .media-box img, .media-box video { display: block; margin: 0 auto; }
        #imageModal { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #imageModal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    </style>
</head>

<div id="password-lock" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8fafc; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <h2 style="color: #003366; margin-bottom: 20px;">시스템 접속</h2>
    <input type="password" id="pw-input" style="padding: 15px; font-size: 1.5rem; border: 2px solid #cbd5e1; border-radius: 12px; text-align: center; margin-bottom: 15px; outline: none; width: 200px;" placeholder="비밀번호" onkeypress="if(event.key === 'Enter') checkPassword()">
    <button onclick="checkPassword()" style="padding: 15px 40px; background: #003366; color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 234px;">확인</button>
    <script>
        function checkPassword() {
            if(document.getElementById('pw-input').value === '12345') {
                document.getElementById('password-lock').style.display = 'none';
            } else {
                alert('비밀번호가 일치하지 않습니다.');
                document.getElementById('pw-input').value = '';
                document.getElementById('pw-input').focus();
            }
        }
    </script>
